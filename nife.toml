app = "lucky-spark-1186"
github = "https://github.com/rahul-nife/react_password_generator/archive/refs/heads/main.zip"
id = "df3cbd214ff3b1cbcedf93d9c055b16ab622c1f82550adeacf7453d515e684f67a4655f43c4bc37a119fdd8dc56741e9"
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  builtin = "GitHub"

[env]

[experimental]
  allowed_public_ports = []
  auto_rollback = true

[[services]]
  external_port = "3000"
  http_checks = []
  internal_port = "3000"
  protocol = "tcp"
  routing_policy = "latency"
  script_checks = []

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

  [services.limits]
    cpu = "500m"
    memory = "1Gi"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.requests]
    cpu = "193m"
    memory = "358Mi"

  [[services.tcp_checks]]
    grace_period = "1s"
    interval = "15s"
    restart_limit = 6
    timeout = "2s"
